<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512" fill="none">
  <!-- 컨테이너 (둥근 사각 타일) -->
  <rect x="1" y="1" width="98" height="98" rx="22" fill="#FDF6EE" stroke="#2D2D2D" stroke-width="2"/>
  <!-- 꽃을 타일 정중앙에 맞춤: 콘텐츠 중심(50,47)을 +3 내려 (50,50)으로, 그 뒤 1.11배 확대 -->
  <g transform="translate(50 50) scale(1.11) translate(-50 -50)">
    <g transform="translate(0 3)">
      <ellipse cx="50" cy="28" rx="14" ry="20" fill="#4ADE80" stroke="#2D2D2D" stroke-width="2" transform="rotate(0 50 50)"/>
      <ellipse cx="50" cy="28" rx="14" ry="20" fill="#EF4444" stroke="#2D2D2D" stroke-width="2" transform="rotate(72 50 50)"/>
      <ellipse cx="50" cy="28" rx="14" ry="20" fill="#FACC15" stroke="#2D2D2D" stroke-width="2" transform="rotate(144 50 50)"/>
      <ellipse cx="50" cy="28" rx="14" ry="20" fill="#E2E8F0" stroke="#2D2D2D" stroke-width="2" transform="rotate(216 50 50)"/>
      <ellipse cx="50" cy="28" rx="14" ry="20" fill="#60A5FA" stroke="#2D2D2D" stroke-width="2" transform="rotate(288 50 50)"/>
      <circle cx="50" cy="50" r="14" fill="#FACC15" stroke="#2D2D2D" stroke-width="2"/>
      <circle cx="46" cy="48" r="2" fill="#2D2D2D"/>
      <circle cx="54" cy="48" r="2" fill="#2D2D2D"/>
      <path d="M46 54 Q50 58 54 54" stroke="#2D2D2D" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </g>
  </g>
</svg>
